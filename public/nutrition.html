<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#FAFAF8;--bg2:#FFFFFF;--bg3:#F5F3EF;--bg4:#EDEAE4;
--text:#1A1A1A;--text2:#5A5A5A;--text3:#9A9A9A;
--gold:#B8860B;--gold-l:#FFF8E7;--gold-d:#8B6508;--gold-xl:#FFFDF5;
--blue:#1A6FB5;--blue-l:#E3F0FB;
--green:#1B7A45;--green-l:#E6F4EC;
--red:#C43333;--red-l:#FDE8E8;
--border:#E0DDD8;--radius:12px;--radius-lg:16px;
--font:'DM Sans',system-ui,sans-serif;
--shadow:0 2px 12px rgba(0,0,0,.06);--shadow-lg:0 8px 32px rgba(0,0,0,.08);
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ─── AUTH SCREENS ─── */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,var(--bg) 0%,var(--gold-xl) 50%,var(--bg) 100%)}
.auth-card{width:100%;max-width:400px;background:var(--bg2);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);overflow:hidden}
.auth-header{padding:32px 32px 20px;text-align:center}
.logo{font-size:32px;font-weight:700;letter-spacing:-0.5px}.logo em{font-style:normal;color:var(--gold)}
.logo-sub{font-size:9px;letter-spacing:4px;color:var(--text3);text-transform:uppercase;margin-top:2px}
.auth-body{padding:0 32px 32px}
.auth-title{font-size:18px;font-weight:700;margin-bottom:4px}
.auth-desc{font-size:12px;color:var(--text2);margin-bottom:20px}
.auth-toggle{font-size:12px;color:var(--text2);text-align:center;margin-top:16px}
.auth-toggle a{color:var(--gold);font-weight:600;cursor:pointer;text-decoration:none}
.auth-toggle a:hover{text-decoration:underline}
.auth-error{padding:10px 14px;background:var(--red-l);color:var(--red);font-size:12px;border-radius:8px;margin-bottom:12px;display:none}
.auth-success{padding:10px 14px;background:var(--green-l);color:var(--green);font-size:12px;border-radius:8px;margin-bottom:12px;display:none}
.auth-lang{display:flex;justify-content:center;gap:6px;margin-bottom:20px}
.lang-btn{padding:6px 14px;border:1.5px solid var(--border);border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;background:var(--bg2);transition:all .2s;font-family:var(--font)}
.lang-btn.on{background:var(--gold);color:white;border-color:var(--gold)}

/* ─── FORM ELEMENTS ─── */
.field{margin-bottom:16px}
.label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.label .req{color:var(--red)}
.input,.textarea,.select{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:var(--radius);font-family:var(--font);font-size:14px;color:var(--text);background:var(--bg2);transition:all .2s}
.input:focus,.textarea:focus,.select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-l)}
.textarea{min-height:70px;resize:vertical}
.input::placeholder,.textarea::placeholder{color:var(--text3)}
.select{appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%239A9A9A' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 14px center;padding-right:36px;cursor:pointer}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border:none;border-radius:var(--radius);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;width:100%}
.btn-gold{background:var(--gold);color:white}.btn-gold:hover{background:var(--gold-d)}
.btn-gold:disabled{background:var(--bg4);color:var(--text3);cursor:not-allowed}
.btn-outline{background:none;border:1.5px solid var(--border);color:var(--text2)}.btn-outline:hover{background:var(--bg3)}
.btn-sm{padding:8px 14px;font-size:12px;width:auto}
.btn-row{display:flex;gap:8px;margin-top:20px}

/* Choices */
.choices{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.choice{padding:8px 14px;border:1.5px solid var(--border);border-radius:30px;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;background:var(--bg2);user-select:none}
.choice:hover{border-color:var(--gold);background:var(--gold-l)}
.choice.on{background:var(--gold);color:white;border-color:var(--gold)}
.scale-row{display:flex;gap:4px}.scale-dot{flex:1;aspect-ratio:1;max-width:36px;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;background:var(--bg2)}
.scale-dot:hover{border-color:var(--gold)}.scale-dot.on{background:var(--gold);color:white;border-color:var(--gold)}
.budget-opt{padding:12px;border:1.5px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .2s;background:var(--bg2);margin-bottom:6px}
.budget-opt:hover{border-color:var(--gold)}.budget-opt.on{border-color:var(--gold);background:var(--gold-l)}
.budget-opt strong{font-size:13px}.budget-opt span{font-size:10px;color:var(--text2);display:block;margin-top:2px}

/* ─── APP LAYOUT ─── */
.app{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--border);padding:20px 0;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50}
.sb-logo{padding:0 20px 20px;border-bottom:1px solid var(--border)}
.sb-nav{flex:1;padding:12px 10px}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;color:var(--text2);border:none;background:none;width:100%;text-align:left;font-family:var(--font)}
.sb-item:hover{background:var(--bg3);color:var(--text)}
.sb-item.on{background:var(--gold-l);color:var(--gold-d);font-weight:600}
.sb-item .icon{font-size:18px;width:24px;text-align:center}
.sb-footer{padding:12px 16px;border-top:1px solid var(--border)}
.sb-user{display:flex;align-items:center;gap:10px}
.sb-avatar{width:36px;height:36px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:14px}
.sb-uname{font-size:12px;font-weight:600}.sb-uemail{font-size:10px;color:var(--text3)}
.main{margin-left:240px;flex:1;padding:24px 28px;min-height:100vh}

/* Mobile */
.mob-header{display:none;position:fixed;top:0;left:0;right:0;background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;z-index:40;align-items:center;justify-content:space-between}
.mob-toggle{background:none;border:none;font-size:22px;cursor:pointer}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.2);z-index:45}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .3s}.sidebar.open{transform:translateX(0)}
  .mob-header{display:flex}.mob-overlay.show{display:block}
  .main{margin-left:0;padding:68px 14px 24px}
}

/* ─── DASHBOARD CARDS ─── */
.page-title{font-size:22px;font-weight:700;margin-bottom:4px}
.page-desc{font-size:13px;color:var(--text2);margin-bottom:20px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:20px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;box-shadow:var(--shadow)}
.card-lg{grid-column:span 2}
@media(max-width:600px){.card-lg{grid-column:span 1}}
.card-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.card-value{font-size:28px;font-weight:700;color:var(--gold)}
.card-sub{font-size:11px;color:var(--text2);margin-top:4px}
.card-icon{font-size:28px;float:right;margin-top:-4px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bg3)}
.stat-row:last-child{border:none}
.stat-label{font-size:12px;color:var(--text2)}.stat-val{font-size:13px;font-weight:600}

/* Program card */
.program-card{background:linear-gradient(135deg,var(--gold-xl),var(--gold-l));border:1.5px solid var(--gold);border-radius:var(--radius-lg);padding:24px;margin-bottom:20px}
.program-card h3{font-size:16px;margin-bottom:4px}
.program-card p{font-size:12px;color:var(--text2)}
.program-actions{display:flex;gap:8px;margin-top:14px}

/* Feedback form */
.feedback-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px}
.feedback-title{font-size:14px;font-weight:700;margin-bottom:12px}
.fb-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
@media(max-width:480px){.fb-row{grid-template-columns:1fr}}

/* Progress chart (CSS only) */
.chart-area{height:180px;display:flex;align-items:flex-end;gap:3px;padding:8px 0;border-bottom:1px solid var(--bg4)}
.chart-bar{flex:1;background:var(--gold-l);border-radius:4px 4px 0 0;min-height:4px;transition:height .5s;position:relative}
.chart-bar .tip{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:600;color:var(--gold-d);white-space:nowrap;display:none}
.chart-bar:hover .tip{display:block}
.chart-bar:hover{background:var(--gold)}
.chart-labels{display:flex;gap:3px;margin-top:4px}.chart-labels span{flex:1;text-align:center;font-size:8px;color:var(--text3)}

/* Onboarding progress */
.onb-progress{margin:20px 0;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.onb-fill{height:100%;background:var(--gold);border-radius:3px;transition:width .4s}
.onb-step{font-size:11px;color:var(--text3);text-align:center;margin-bottom:16px}

/* Section in onboarding */
.onb-section{font-size:18px;font-weight:700;margin-bottom:4px}
.onb-desc{font-size:12px;color:var(--text2);margin-bottom:20px}
.onb-icon{font-size:28px;margin-bottom:8px}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;padding:12px 20px;background:var(--gold);color:white;border-radius:var(--radius);font-size:13px;font-weight:600;box-shadow:var(--shadow-lg);z-index:100;animation:slideUp .3s ease;display:none}
.toast.show{display:block}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Info box */
.info-box{padding:12px 14px;border-radius:var(--radius);font-size:12px;line-height:1.5;margin:10px 0}
.info-gold{background:var(--gold-l);border-left:3px solid var(--gold)}
.info-green{background:var(--green-l);border-left:3px solid var(--green)}
.info-blue{background:var(--blue-l);border-left:3px solid var(--blue)}

/* Animations */
.fade-in{animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* Empty state */
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-title{font-size:16px;font-weight:600;color:var(--text2);margin-bottom:4px}
.empty-text{font-size:12px;line-height:1.5}
</style>
</head>

  var res=await sb.auth.signInWithPassword({email:email,password:pw});
  if(res.error){showAuthError(res.error.message);return}
  await loadUser();
}

async function doSignup(){
  var email=document.getElementById("auth-email").value;
  var pw=document.getElementById("auth-pw").value;
  var name=document.getElementById("auth-name").value;
  if(!email||!pw||!name)return;
  var res=await sb.auth.signUp({email:email,password:pw,options:{emailRedirectTo:window.location.origin+"/nutrition.html"}});
  if(res.error){showAuthError(res.error.message);return}
  if(res.data.user){
    await sb.from("client_accounts").insert({id:res.data.user.id,email:email,name:name,language:state.lang});
    showAuthSuccess(t().confirmEmail);
  }
}

async function doLogout(){
  await sb.auth.signOut();
  state.user=null;state.account=null;state.profile=null;state.feedbacks=[];
  render();
}

function showAuthError(msg){var el=document.getElementById("auth-error");if(el){el.textContent=msg;el.style.display="block"}}
function showAuthSuccess(msg){var el=document.getElementById("auth-success");if(el){el.textContent=msg;el.style.display="block"}}

// ═══════════════════════════════════════════
// DATA LOADING
// ═══════════════════════════════════════════
async function loadUser(){
  var sess=await sb.auth.getSession();
  if(!sess.data.session){state.loading=false;render();return}
  state.user=sess.data.session.user;
  var acc=await sb.from("client_accounts").select("*").eq("id",state.user.id).single();
  if(acc.data){state.account=acc.data;state.lang=acc.data.language||"fr"}
  if(state.account&&state.account.nutrition_profile_id){
    var prof=await sb.from("nutrition_profiles").select("*").eq("id",state.account.nutrition_profile_id).single();
    if(prof.data)state.profile=prof.data;
  }
  var fbId=state.account&&state.account.nutrition_profile_id?state.account.nutrition_profile_id:state.user.id;
  var fb=await sb.from("weekly_feedbacks").select("*").eq("client_id",fbId).order("week_number",{ascending:true});
  if(fb.data)state.feedbacks=fb.data;
  state.loading=false;
  render();
}

// ═══════════════════════════════════════════
// ONBOARDING (questionnaire steps)
// ═══════════════════════════════════════════
function onbSet(k,v){state.onbData[k]=v;render()}
function onbToggle(k,v){
  if(!state.onbData[k])state.onbData[k]=[];
  var i=state.onbData[k].indexOf(v);
  if(i===-1)state.onbData[k].push(v);else state.onbData[k].splice(i,1);
  render();
}
function onbNext(){state.onbStep++;render();window.scrollTo(0,0)}
function onbBack(){state.onbStep--;render();window.scrollTo(0,0)}

async function onbSubmit(){
  var d=state.onbData;
  var id=uid();
  d.id=id;d.language=state.lang;d.status="new";
  var dbData={};
  Object.keys(d).forEach(function(k){dbData[k]=Array.isArray(d[k])?d[k].join(", "):d[k]});
  var res=await sb.from("nutrition_profiles").insert(dbData);
  if(res.error){alert("Erreur: "+res.error.message);return}
  await sb.from("client_accounts").update({onboarding_done:true,nutrition_profile_id:id}).eq("id",state.user.id);
  state.account.onboarding_done=true;state.account.nutrition_profile_id=id;
  state.page="dashboard";state.onbStep=0;
  showToast(t().onbDone);
  render();
}

// ═══════════════════════════════════════════
// FEEDBACK
// ═══════════════════════════════════════════
async function submitFeedback(){
  var wk=state.feedbacks.length+1;
  var fb={
    id:uid(),client_id:state.account&&state.account.nutrition_profile_id?state.account.nutrition_profile_id:state.user.id,week_number:wk,
    weight:parseFloat(document.getElementById("fb-weight").value)||null,
    waist:parseFloat(document.getElementById("fb-waist").value)||null,
    energy:parseInt(document.getElementById("fb-energy").value)||null,
    hunger:parseInt(document.getElementById("fb-hunger").value)||null,
    adherence:parseInt(document.getElementById("fb-adherence").value)||null,
    sleep_hours:parseFloat(document.getElementById("fb-sleep").value)||null,
    water_liters:parseFloat(document.getElementById("fb-water").value)||null,
    mood:parseInt(document.getElementById("fb-mood").value)||null,
    notes:document.getElementById("fb-notes").value||"",
    cycle_phase:document.getElementById("fb-cycle")?document.getElementById("fb-cycle").value:""
  };
  var res=await sb.from("weekly_feedbacks").insert(fb);
  if(res.error){alert("Erreur: "+res.error.message);return}
  state.feedbacks.push(fb);
  showToast(t().fbSent);
  render();
}

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
function showToast(msg){
  state.toast=msg;render();
  setTimeout(function(){state.toast="";render()},3000);
}

// RENDER
// ═══════════════════════════════════════════
function render(){
  var root=document.getElementById("root");
  if(state.loading){root.innerHTML='<div class="auth-wrap"><div style="text-align:center"><div class="logo">BODY<em>FIT</em></div><p style="margin-top:8px;color:var(--text3)">Chargement...</p></div></div>';return}

// ─── ONBOARDING ───
function renderOnboarding(){
  var l=t();var d=state.onbData;var step=state.onbStep;
  var steps=buildOnbSteps(l,d);var total=steps.length;
  var pct=Math.round((step+1)/total*100);

  var h='<div style="max-width:640px;margin:0 auto;padding:20px 16px 60px">'+
    '<div style="text-align:center;padding:16px 0"><div class="logo">BODY<em>FIT</em></div></div>'+
    '<div class="auth-lang" style="margin-bottom:16px">'+
    '<button class="lang-btn'+(state.lang==="fr"?" on":"")+'" onclick="state.lang=\'fr\';render()">FR</button>'+
    '<button class="lang-btn'+(state.lang==="pt"?" on":"")+'" onclick="state.lang=\'pt\';render()">PT</button>'+
    '<button class="lang-btn'+(state.lang==="en"?" on":"")+'" onclick="state.lang=\'en\';render()">EN</button></div>'+
    '<div class="onb-progress"><div class="onb-fill" style="width:'+pct+'%"></div></div>'+
    '<div class="onb-step">'+(step+1)+' / '+total+'</div>'+
    '<div class="fade-in">'+steps[step]+'</div>'+
    '<div class="btn-row">';
  if(step>0) h+='<button class="btn btn-outline" onclick="onbBack()">'+l.back+'</button>';
  if(step<total-1) h+='<button class="btn btn-gold" onclick="onbNext()">'+l.next+'</button>';
  else h+='<button class="btn btn-gold" onclick="onbSubmit()">'+l.submit+' ✓</button>';
  h+='</div></div>';
  return h;
}

function buildOnbSteps(l,d){
  var steps=[];

    fieldI(l.name,"name",d)+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'+
    choicesSingle("sex",[l.male,l.female],l.sex,d)+
    fieldI(l.age,"age",d,"number")+'</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'+
    fieldI(l.weight,"weight",d,"number","kg")+fieldI(l.height,"height",d,"number","cm")+'</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'+
    fieldI(l.waist,"waist",d,"number","cm")+fieldI(l.bodyFat,"body_fat",d,"number","%")+'</div>'+
    fieldI(l.targetW,"target_weight",d,"number")+
    choicesSingle("timeline",[l.tl1,l.tl2,l.tl3,l.tl4,l.tl5],l.timeline,d)
  );

  // 2. Objectif
  steps.push(onbHead("🎯",l.onb_p2,l.onb_p2d)+
    choicesSingle("goal",[l.g1,l.g2,l.g3,l.g4,l.g5,l.g6],l.goal,d)+
    fieldTA(l.goalDetail,"goal_detail",d)
  );

  // 3. Activité
  steps.push(onbHead("💪",l.onb_p3,l.onb_p3d)+
    choicesSingle("ems_frequency",["1x/sem","2x/sem"],l.emsFreq,d)+
    choicesSingle("ems_time",[l.emsMorning||"Matin",l.emsNoon||"Midi",l.emsAfternoon||"Apr\u00e8s-midi",l.emsEvening||"Soir"],l.emsTime||"Moment de la s\u00e9ance EMS",d)+
    choicesMulti("other_activities",[l.noOther,l.walk,l.run,l.gym,l.swim,l.yoga,l.bike,l.other],l.otherAct,d)+
    choicesSingle("other_intensity",[l.intLight||"L\u00e9g\u00e8re",l.intMod||"Mod\u00e9r\u00e9e",l.intHigh||"Intense"],l.otherIntensity||"Intensit\u00e9 des autres activit\u00e9s",d)+
    choicesSingle("daily_activity",[l.sed,l.light,l.actif,l.vActif],l.dailyAct,d)

  // 4. Santé

    choicesSingle("pregnant",[l.pregNo||"Non",l.pregYes||"Oui",l.pregNA||"N/A"],l.pregnant||"Enceinte ou allaitante ?",d)+

    choicesMulti("diet_type",[l.dietNone,l.veg,l.vegan,l.gf,l.halal,l.noPork],l.diet,d)+
    choicesSingle("menstrual_cycle",[l.cycReg,l.cycIrreg,l.cycPeri||"P\u00e9rim\u00e9nopause",l.cycMeno,l.cycNA,l.cycNo||"Pr\u00e9f\u00e8re ne pas r\u00e9pondre"],l.cycle,d)
  );

  // 5. Mode de vie
  steps.push(onbHead("🌙",l.onb_p5,l.onb_p5d)+
    choicesSingle("sleep_hours",["<5h","5-6h","6-7h","7-8h","8h+"],l.sleepH,d)+
    choicesSingle("sleep_quality",[l.sqGood,l.sqMed,l.sqBad],l.sleepQ,d)+

    scaleF("stress_level",1,10,"",d)+
    choicesSingle("work_schedule",[l.wsClass,l.wsLong,l.wsShift,l.wsNight,l.wsRemote,l.wsVar||"Variable"],l.workSched,d)+
    fieldI(l.mealTimes,"meal_times",d,null,l.mealPh)

  // 6. Habitudes

  // 7. Préférences

    choicesSingle("cook_time",[l.ct1,l.ct2,l.ct3,l.ct4],l.cookTime,d)+
    choicesSingle("cook_level",[l.clBeg||"D\u00e9butant",l.clMid||"Interm\u00e9diaire",l.clAdv||"\u00c0 l\u2019aise",l.clChef||"Chef \u00e0 la maison"],l.cookLevel||"Niveau en cuisine",d)+
    choicesSingle("cook_for",[l.cf1,l.cf2,l.cf3],l.cookFor,d)+

  // 8. Budget
  steps.push(onbHead("💰",l.onb_p8,l.onb_p8d)+

    choicesMulti("grocery_stores",[l.stLidl,l.stPingo,l.stCont,l.stMarket],l.stores,d)

    choicesSingle("open_to_supplements",[l.soYes,l.soMaybe,l.soNo,l.soAlready],l.suppOpen,d)
  );

  // 10. Motivation
  steps.push(onbHead("🔥",l.onb_p10,l.onb_p10d)+
    choicesSingle("previous_diet",[l.pdNo,l.pdYes],l.prevDiet,d)+
    fieldI(l.prevDetail,"previous_diet_detail",d)+
    choicesMulti("main_obstacle",[l.obHunger,l.obTime,l.obBoring,l.obSocial,l.obCost,l.obMotiv],l.obstacle,d)+
    choicesSingle("program_style",[l.psStrict,l.psFlex,l.psFree],l.progStyle,d)+
    choicesMulti("motivation",[l.m1,l.m2,l.m3,l.m4,l.m5],l.motivL,d)+
    fieldTA(l.finalNote,"final_note",d)+
    '<div class="field" style="margin-top:16px;padding:14px;background:var(--bg3);border-radius:var(--radius);border:1px solid var(--border)">'+
    '<div style="display:flex;gap:10px;align-items:flex-start;cursor:pointer" onclick="onbSet(\'rgpd\',state.onbData.rgpd?\'\':\'yes\')">'+

    '</div></div>'

  return steps;

// Onboarding field helpers
function onbHead(icon,title,desc){return '<div class="onb-icon">'+icon+'</div><div class="onb-section">'+title+'</div><div class="onb-desc">'+desc+'</div>'}
function fieldI(label,key,d,type,ph){
  return '<div class="field"><div class="label">'+label+'</div><input class="input" type="'+(type||"text")+'" placeholder="'+(ph||"")+'" value="'+(d[key]||"")+'" onchange="onbSet(\''+key+'\',this.value)"/></div>';
}
function fieldTA(label,key,d,ph){
  return '<div class="field"><div class="label">'+label+'</div><textarea class="textarea" placeholder="'+(ph||"")+'" onchange="onbSet(\''+key+'\',this.value)">'+(d[key]||"")+'</textarea></div>';
}
function choicesSingle(key,opts,label,d){
  var h='<div class="field"><div class="label">'+label+'</div><div class="choices">';
  opts.forEach(function(o){h+='<div class="choice'+(d[key]===o?" on":"")+'" onclick="onbSet(\''+key+'\',\''+o.replace(/'/g,"\\'")+'\')">'+o+'</div>'});
  return h+'</div></div>';
}
function choicesMulti(key,opts,label,d){
  var h='<div class="field"><div class="label">'+label+'</div><div class="choices">';
  opts.forEach(function(o){
    var sel=d[key]&&d[key].indexOf(o)!==-1;
    h+='<div class="choice'+(sel?" on":"")+'" onclick="onbToggle(\''+key+'\',\''+o.replace(/'/g,"\\'")+'\')">'+o+'</div>'});
  return h+'</div></div>';
}
function scaleF(key,min,max,label,d){
  var h='<div class="field"><div class="label">'+label+'</div><div class="scale-row">';
  for(var i=min;i<=max;i++){h+='<div class="scale-dot'+(d[key]===i?" on":"")+'" onclick="onbSet(\''+key+'\','+i+')">'+i+'</div>'}
  return h+'</div></div>';
}
function budgetCards(key,opts,label,d){
  var h='<div class="field"><div class="label">'+label+'</div>';
  opts.forEach(function(o){
    h+='<div class="budget-opt'+(d[key]===o[0]?" on":"")+'" onclick="onbSet(\''+key+'\',\''+o[0]+'\')"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:20px">'+o[2]+'</span><div><strong>'+o[0]+'</strong><span>'+o[1]+'</span></div></div></div>'});
  return h+'</div>';
}

    '<div class="auth-lang" style="margin-top:10px">'+
    '<button class="lang-btn'+(state.lang==="fr"?" on":"")+'" onclick="state.lang=\'fr\';render()">FR</button>'+
    '<button class="lang-btn'+(state.lang==="pt"?" on":"")+'" onclick="state.lang=\'pt\';render()">PT</button>'+
    '<button class="lang-btn'+(state.lang==="en"?" on":"")+'" onclick="state.lang=\'en\';render()">EN</button></div>'+
    '<button class="btn btn-outline btn-sm" style="margin-top:8px;width:100%" onclick="doLogout()">'+l.logout+'</button></div></aside>';

  // Mobile header
  var mob='<div class="mob-header"><button class="mob-toggle" onclick="state.sidebarOpen=!state.sidebarOpen;render()">☰</button><div class="logo" style="font-size:18px">BODY<em>FIT</em></div><div class="sb-avatar" style="width:30px;height:30px;font-size:12px">'+initial+'</div></div>';
  var overlay='<div class="mob-overlay'+(state.sidebarOpen?" show":"")+'" onclick="state.sidebarOpen=false;render()"></div>';

  // Page content
  var content='';
  if(p==="dashboard") content=renderDashboard(l,a);
  else if(p==="program") content=renderProgram(l,a);
  else if(p==="feedback") content=renderFeedback(l);
  else if(p==="progress") content=renderProgress(l,a);

  var toast=state.toast?'<div class="toast show">'+state.toast+'</div>':'';

  return mob+overlay+sb+'<main class="main"><div class="fade-in">'+content+'</div></main>'+toast;
}

function navItem(key,icon,label,current){
  return '<button class="sb-item'+(current===key?" on":"")+'" onclick="state.page=\''+key+'\';state.sidebarOpen=false;render()"><span class="icon">'+icon+'</span>'+label+'</button>';
}

// ─── DASHBOARD ───
function renderDashboard(l,a){
  var name=(a&&a.name)?a.name.split(" ")[0]:"";
  var hasProg=a&&a.active_program_url;
  var lastFb=state.feedbacks.length?state.feedbacks[state.feedbacks.length-1]:null;
  var lastW=lastFb?lastFb.weight:(state.profile?parseFloat(state.profile.weight):null);
  var targetW=state.profile?parseFloat(state.profile.target_weight):null;
  var remaining=lastW&&targetW?Math.round((lastW-targetW)*10)/10:null;

  var h='<div class="page-title">'+l.welcome+', '+name+' 👋</div><div class="page-desc">'+l.welcomeDesc+'</div>';

  // Program card
  if(hasProg){
    h+='<div class="program-card"><h3>'+l.myProgram+'</h3><p>Programme actif</p>'+
      '<div class="program-actions"><a href="'+a.active_program_url+'" target="_blank" class="btn btn-gold btn-sm">'+l.downloadPdf+' 📥</a></div></div>';
  } else if(a&&a.onboarding_done){
    h+='<div class="program-card"><h3>'+l.noProgram+' ⏳</h3><p>'+l.noProgramDesc+'</p></div>';
  } else {
    h+='<div class="program-card"><h3>'+l.startOnb+'</h3><p>'+l.completeOnb+'</p>'+
      '<div class="program-actions"><button class="btn btn-gold btn-sm" onclick="state.account.onboarding_done=false;render()">'+l.startOnb+' →</button></div></div>';
  }

  // Stats cards
  h+='<div class="card-grid">';
  if(lastW){
    h+='<div class="card"><div class="card-icon">⚖️</div><div class="card-label">'+l.currentWeight+'</div><div class="card-value">'+lastW+'<span style="font-size:14px;color:var(--text2)"> kg</span></div></div>';
  }
  if(targetW){
    h+='<div class="card"><div class="card-icon">🎯</div><div class="card-label">'+l.targetWeight+'</div><div class="card-value" style="color:var(--green)">'+targetW+'<span style="font-size:14px;color:var(--text2)"> kg</span></div></div>';
  }
  if(remaining!==null&&remaining>0){
    h+='<div class="card"><div class="card-icon">📉</div><div class="card-label">'+l.remaining+'</div><div class="card-value" style="color:var(--blue)">'+remaining+'<span style="font-size:14px;color:var(--text2)"> kg</span></div></div>';
  }
  h+='<div class="card"><div class="card-icon">📝</div><div class="card-label">Feedbacks</div><div class="card-value">'+state.feedbacks.length+'</div><div class="card-sub">'+l.weekN+'</div></div>';
  h+='</div>';

  // Last feedback summary
  if(lastFb){
    h+='<div class="card"><div class="card-label">Dernier feedback — '+l.weekN+' '+lastFb.week_number+'</div>';
    h+='<div class="stat-row"><span class="stat-label">'+l.energy+'</span><span class="stat-val">'+lastFb.energy+'/5</span></div>';
    h+='<div class="stat-row"><span class="stat-label">'+l.hunger+'</span><span class="stat-val">'+lastFb.hunger+'/5</span></div>';
    h+='<div class="stat-row"><span class="stat-label">'+l.adherence+'</span><span class="stat-val">'+lastFb.adherence+'%</span></div>';
    h+='<div class="stat-row"><span class="stat-label">'+l.mood+'</span><span class="stat-val">'+lastFb.mood+'/5</span></div>';
    h+='</div>';
  }

  return h;
}

// ─── PROGRAM ───
function renderProgram(l,a){
  var hasProg=a&&a.active_program_url;
  if(hasProg){
    return '<div class="page-title">'+l.myProgram+'</div><div class="page-desc">Votre programme nutritionnel personnalise</div>'+
      '<div class="program-card"><h3>Programme actif ✅</h3>'+
      '<div class="program-actions"><a href="'+a.active_program_url+'" target="_blank" class="btn btn-gold btn-sm">'+l.downloadPdf+' 📥</a></div></div>';
  }
  return '<div class="page-title">'+l.myProgram+'</div>'+
    '<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">'+l.noProgram+'</div><div class="empty-text">'+l.noProgramDesc+'</div></div>';
}

// ─── FEEDBACK ───
function renderFeedback(l){
  var wk=state.feedbacks.length+1;
  var h='<div class="page-title">'+l.weeklyFb+'</div><div class="page-desc">'+l.fbDesc+'</div>';
  h+='<div class="feedback-card"><div class="feedback-title">'+l.weekN+' '+wk+'</div>';
  h+='<div class="fb-row">'+
    fbField(l.weight,"fb-weight","number","kg")+fbField(l.waistFb,"fb-waist","number","cm")+
    '</div><div class="fb-row">'+
    fbField(l.energy,"fb-energy","number","1-5")+fbField(l.hunger,"fb-hunger","number","1-5")+
    '</div><div class="fb-row">'+
    fbField(l.adherence,"fb-adherence","number","0-100")+fbField(l.sleep,"fb-sleep","number","h")+
    '</div><div class="fb-row">'+
    fbField(l.water,"fb-water","number","L")+fbField(l.mood,"fb-mood","number","1-5")+
    '</div>';
  h+='<div class="field"><div class="label">'+l.notes+'</div><textarea class="textarea" id="fb-notes" placeholder="Comment vous sentez-vous cette semaine ?"></textarea></div>';
  h+='<button class="btn btn-gold" onclick="submitFeedback()">'+l.sendFb+' ✓</button>';
  h+='</div>';

  // Previous feedbacks
  if(state.feedbacks.length){
    h+='<div class="card" style="margin-top:16px"><div class="card-label">Historique</div>';
    state.feedbacks.slice().reverse().forEach(function(fb){
      h+='<div class="stat-row"><span class="stat-label">'+l.weekN+' '+fb.week_number+'</span><span class="stat-val">'+(fb.weight?fb.weight+'kg':'—')+' | E:'+fb.energy+' | A:'+fb.adherence+'%</span></div>';
    });
    h+='</div>';
  }
  return h;
}

function fbField(label,id,type,ph){
  return '<div class="field"><div class="label">'+label+'</div><input class="input" id="'+id+'" type="'+(type||"text")+'" placeholder="'+(ph||"")+'"/></div>';
}

// ─── PROGRESS ───
function renderProgress(l,a){
  var fbs=state.feedbacks;
  var h='<div class="page-title">'+l.progressTitle+'</div>';

  if(!fbs.length){
    return h+'<div class="empty"><div class="empty-icon">📈</div><div class="empty-title">'+l.noData+'</div><div class="empty-text">Remplissez votre premier feedback pour voir votre progression.</div></div>';
  }

  // Weight chart
  var weights=fbs.filter(function(f){return f.weight}).map(function(f){return f.weight});
  if(weights.length){
    var minW=Math.min.apply(null,weights)-2;
    var maxW=Math.max.apply(null,weights)+2;
    var range=maxW-minW||1;
    h+='<div class="card card-lg"><div class="card-label">'+l.weightChart+'</div>';
    h+='<div class="chart-area">';
    weights.forEach(function(w,i){
      var pct=((w-minW)/range)*100;
      h+='<div class="chart-bar" style="height:'+Math.max(pct,8)+'%"><div class="tip">'+w+'kg</div></div>';
    });
    h+='</div><div class="chart-labels">';
    fbs.forEach(function(f,i){h+='<span>'+l.weekN+(i+1)+'</span>'});
    h+='</div></div>';
  }

  // Stats table
  h+='<div class="card" style="margin-top:14px"><div class="card-label">Details par semaine</div>';
  fbs.forEach(function(fb){
    h+='<div class="stat-row"><span class="stat-label" style="min-width:50px;font-weight:600">'+l.weekN+' '+fb.week_number+'</span>'+
      '<span class="stat-val" style="font-size:11px">'+(fb.weight?fb.weight+'kg':'—')+' | E:'+fb.energy+'/5 | F:'+(fb.hunger||"—")+'/5 | A:'+(fb.adherence||"—")+'% | 😊'+(fb.mood||"—")+'/5</span></div>';
  });
  h+='</div>';

  return h;
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
loadUser();
</script>
</body>
